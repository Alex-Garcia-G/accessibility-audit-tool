name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  server:
    name: Server — lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      # prisma generate (postinstall) reads schema.prisma — no real DB needed,
      # but Prisma requires DATABASE_URL to be set for schema validation.
      - name: Install dependencies
        run: npm ci
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

  client:
    name: Client — lint · typecheck · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      # tsc -b + vite build — catches type errors and verifies the bundle compiles
      - name: Build
        run: npm run build
